version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: finlogic_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: finlogic
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ../database/init.sql:/docker-entrypoint-initdb.d/init.sql

  api:
    build:
      context: ../api
    container_name: finlogic_api
    restart: always
    ports:
      - "3000:3000"
    environment:
      DB_HOST: db
      DB_USER: user
      DB_PASSWORD: password
      DB_NAME: finlogic
    depends_on:
      - db
    volumes:
      - ../api:/usr/src/app
      - /usr/src/app/node_modules

  app:
    build:
      context: ../app
    container_name: finlogic_app
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      - api
    volumes:
      - ../app:/usr/src/app
      - /usr/src/app/node_modules

volumes:
  db_data:
